name: CI

# Runs on every pull request and on pushes to main.
# All four checks must pass before a PR can be merged (enable branch protection
# on "main" and mark these checks as required — see CONTRIBUTING.md).

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # - name: Test
      #   run: npm run test:run

      - name: Build
        run: npm run build
